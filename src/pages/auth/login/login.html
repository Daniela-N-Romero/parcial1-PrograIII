<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../../../style.css">
</head>

<body>
    <div id="app">
        <section class="card">
            <h1>Login</h1>

            <form id="form">

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" autocomplete="off" placeholder="example@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" autocomplete="off" placeholder="********">
                </div>

                <button type="submit">Ingresar</button>

            </form>
            <a href="../../../../index.html">Volver al Inicio</a>
            <a href="../registro/registro.html">¿No tenés cuenta? Registrate</a>
        </section>
    </div>
    <script type="module" src="./login.ts"></script>
</body>

</html>
